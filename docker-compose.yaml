services:
  web-chat:
    container_name: web-chat
    restart: always
    build: ./src
    working_dir: /usr/web-chat/src
    command: sh -c "
      alembic upgrade head &&
      python main.py
      "
    env_file: ./src/core/envs/.env
    networks:
      - web-chat-network
    ports:
      - "${SERVER_PORT}:${SERVER_PORT}"
    volumes:
      - ./src/core/certs:/usr/web-chat/src/core/certs
    depends_on:
      - web-chat-db
    healthcheck:
      test: curl -f http://localhost:${SERVER_PORT}/api/healthcheck
      interval: 60s
      timeout: 3s
      retries: 3

  web-chat-db:
    image: postgres:16-alpine
    container_name: web-chat-db
    restart: always
    command: -p ${POSTGRES_PORT}
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - web-chat-network
    expose:
      - ${POSTGRES_PORT}
    ports:
      - "${POSTGRES_PORT}:${POSTGRES_PORT}"
    volumes:
      - web-chat-db-data:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -p ${POSTGRES_PORT} -U ${POSTGRES_USER} -d ${POSTGRES_DB}
      interval: 60s
      timeout: 3s
      retries: 3

volumes:
  web-chat-db-data:

networks:
  web-chat-network:
    name: web-chat-network
    external: false
