<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebChat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            width: 800px;
            height: 90vh;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
            padding: 20px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 600;
        }

        .logout-btn {
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid white;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 16px;
        }

        .logout-btn:hover {
            background: white;
            color: #764ba2;
            transform: translateY(-2px);
        }

        .logout-btn:active {
            transform: translateY(0);
        }

        .messages-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
        }

        .message {
            margin-bottom: 15px;
            padding: 12px 16px;
            background: white;
            border-radius: 10px;
            border-left: 4px solid #667eea;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            width: 100%;
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 12px;
            color: #64748b;
        }

        .message-author {
            font-weight: 600;
            color: #764ba2;
        }

        .message-time {
            color: #94a3b8;
        }

        .message-content {
            font-size: 15px;
            color: #1e293b;
            word-wrap: break-word;
        }

        .input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e2e8f0;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
        }

        #messageInput {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        #messageInput:focus {
            border-color: #667eea;
        }

        #sendBtn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        #sendBtn:hover {
            transform: translateY(-2px);
        }

        #sendBtn:active {
            transform: translateY(0);
        }

        #sendBtn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            text-align: center;
            color: #64748b;
            padding: 20px;
        }

        .messages-container::-webkit-scrollbar {
            width: 6px;
        }

        .messages-container::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }

        .messages-container::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="header">
            <h1>WebChat</h1>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>

        <div class="messages-container" id="messagesContainer">
            <div class="loading" id="loadingMessages">Loading messages...</div>
        </div>

        <div class="input-container">
            <div class="input-wrapper">
                <input
                    type="text"
                    id="messageInput"
                    placeholder="Type a message..."
                    autocomplete="off"
                    disabled
                >
                <button id="sendBtn" onclick="sendMessage()" disabled>Send</button>
            </div>
        </div>
    </div>

    <script>
        let token = localStorage.getItem('access_token');

        if (!token) {
            window.location.href = 'login.html';
        }

        let ws = null;
        let isConnected = false;

        function formatTime(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleTimeString('ru-RU', {
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function addMessage(messageData) {
            const messagesContainer = document.getElementById('messagesContainer');

            const loadingEl = document.getElementById('loadingMessages');
            if (loadingEl) {
                loadingEl.remove();
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = 'message';

            const header = document.createElement('div');
            header.className = 'message-header';

            const author = document.createElement('span');
            author.className = 'message-author';
            author.textContent = messageData.username || 'Unknown';

            const time = document.createElement('span');
            time.className = 'message-time';
            time.textContent = formatTime(messageData.created_at);

            header.appendChild(author);
            header.appendChild(time);

            const content = document.createElement('div');
            content.className = 'message-content';
            content.textContent = messageData.content;

            messageDiv.appendChild(header);
            messageDiv.appendChild(content);

            messagesContainer.appendChild(messageDiv);

            const shouldScroll = messagesContainer.scrollHeight - messagesContainer.scrollTop - messagesContainer.clientHeight < 100;
            if (shouldScroll) {
                scrollToBottom();
            }
        }
        async function loadMessageHistory() {
            try {
                const response = await fetch('/api/message/all', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error('Failed to load messages');
                }

                const messages = await response.json();

                const messagesContainer = document.getElementById('messagesContainer');
                messagesContainer.innerHTML = '';

                if (messages.length === 0) {
                    messagesContainer.innerHTML = '<div class="loading">No messages yet. Start the conversation!</div>';
                } else {
                    messages.forEach(message => addMessage(message));

                    scrollToBottom();
                }

                return messages;
            } catch (error) {
                console.error('Error loading messages:', error);
                const messagesContainer = document.getElementById('messagesContainer');
                messagesContainer.innerHTML = '<div class="loading">Failed to load messages. Please refresh the page.</div>';

                if (error.message === 'Failed to load messages') {
                    logout();
                }
            }
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            const sendBtn = document.getElementById('sendBtn');

            if (!message) return;

            try {
                sendBtn.disabled = true;
                input.disabled = true;

                const response = await fetch('/api/message/create', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        content: message
                    })
                });

                if (!response.ok) {
                    throw new Error('Failed to send message');
                }

                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(message);
                }

                input.value = '';

            } catch (error) {
                console.error('Error sending message:', error);
                alert('Failed to send message. Please try again.');
            } finally {
                sendBtn.disabled = false;
                input.disabled = false;
                input.focus();
            }
        }

        function scrollToBottom() {
            const messagesContainer = document.getElementById('messagesContainer');
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function initWebSocket() {
            ws = new WebSocket(`ws://${window.location.host}/api/ws?token=${token}`);

            ws.onopen = function() {
                console.log('WebSocket connected');
                isConnected = true;

                document.getElementById('messageInput').disabled = false;
                document.getElementById('sendBtn').disabled = false;
                document.getElementById('messageInput').focus();
            };

            ws.onerror = function(error) {
                console.error('WebSocket error:', error);
                isConnected = false;
            };

            ws.onclose = function() {
                console.log('WebSocket disconnected');
                isConnected = false;

                document.getElementById('messageInput').disabled = true;
                document.getElementById('sendBtn').disabled = true;

                setTimeout(() => {
                    if (!isConnected && token) {
                        initWebSocket();
                    }
                }, 3000);
            };

            ws.onmessage = function(event) {
                try {
                    const messageText = event.data;

                    const colonIndex = messageText.indexOf(': ');
                    if (colonIndex > 0) {
                        const username = messageText.substring(0, colonIndex);
                        const content = messageText.substring(colonIndex + 2);

                        addMessage({
                            username: username,
                            content: content,
                            created_at: new Date().toISOString()
                        });
                    } else {
                        addMessage({
                            username: 'System',
                            content: messageText,
                            created_at: new Date().toISOString()
                        });
                    }
                } catch (e) {
                    console.error('Error parsing WebSocket message:', e);
                }
            };
        }

        async function logout() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.close();
            }

            localStorage.removeItem('access_token');

            await fetch('/api/auth/logout', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                credentials: 'same-origin'
            });

            window.location.href = 'login.html';
        }

        document.getElementById('messageInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !this.disabled) {
                sendMessage();
            }
        });

        async function init() {
            await loadMessageHistory();

            initWebSocket();
        }

        init();
    </script>
</body>
</html>
