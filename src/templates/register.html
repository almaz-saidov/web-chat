<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
    <style>
        body {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .register-box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            width: 350px;
        }

        h1 {
            color: #4a5568;
            margin: 0 0 25px 0;
            text-align: center;
            font-weight: 600;
        }

        .input-group {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #764ba2;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .link {
            text-align: center;
            margin-top: 20px;
            color: #718096;
        }

        .link a {
            color: #764ba2;
            text-decoration: none;
            font-weight: 500;
        }

        .error {
            background: #fed7d7;
            color: #c53030;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .success {
            background: #c6f6d5;
            color: #276749;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="register-box">
        <h1>Registration</h1>

        <div class="error" id="error"></div>
        <div class="success" id="success"></div>

        <form id="registerForm">
            <div class="input-group">
                <input type="text" id="username" placeholder="Username" required>
            </div>

            <div class="input-group">
                <input type="password" id="password" placeholder="Password" required>
            </div>

            <div class="input-group">
                <input type="password" id="confirmPassword" placeholder="Confirm password" required>
            </div>

            <button type="submit" class="btn">Register</button>
        </form>

        <div class="link">
            Already have an account? <a href="/login.html">Login</a>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').onsubmit = async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const password_confirmation = document.getElementById('confirmPassword').value;

            if (password !== password_confirmation) {
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = 'Passwords do not match';
                return;
            }

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        username,
                        password,
                        password_confirmation
                    })
                });

                if (response.ok) {
                    document.getElementById('error').style.display = 'none';
                    document.getElementById('success').style.display = 'block';
                    document.getElementById('success').textContent = 'Registration successful!';

                    setTimeout(() => {
                        window.location.href = '/login.html';
                    }, 1500);
                } else {
                    const error = await response.json();
                    document.getElementById('error').style.display = 'block';

                    if (response.status === 422 && error.detail) {
                        const validationError = error.detail.find(err => err.loc.includes('username'));
                        if (validationError) {
                            const errorMessage = validationError.msg.replace(/^Value error,\s*/, '');
                            document.getElementById('error').textContent = errorMessage;
                        } else {
                            document.getElementById('error').textContent = error.detail || 'Registration error';
                        }
                    } else {
                        document.getElementById('error').textContent = error.detail || 'Registration error';
                    }
                }
            } catch {
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = 'Connection error';
            }
        };
    </script>
</body>
</html>
